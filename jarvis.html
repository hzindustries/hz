<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Starborne Garden - 3D Bleu (Orb Petit - Visuel Original)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
            background: #000;
            font-family: Arial, sans-serif;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #ai-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 480px;
            height: 100vh;
            z-index: 20;
            padding: 28px 22px;
            background: #000;
            border-right: 1px solid rgba(90, 140, 255, 0.24);
            backdrop-filter: blur(16px);
            box-shadow: 18px 0 42px rgba(0, 0, 0, 0.34);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #ai-panel h2 {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.25rem;
            letter-spacing: 0.04em;
        }
        #ai-panel p {
            color: rgba(210, 225, 255, 0.72);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        #chat-messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 8px 4px 8px 0;
            margin-bottom: 8px;
        }
        .chat-bubble {
            max-width: 92%;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 0.98rem;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
        }
        .chat-bubble.user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(20, 90, 255, 0.95), rgba(0, 170, 255, 0.72));
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .chat-bubble.ai {
            align-self: flex-start;
            background: rgba(16, 24, 52, 0.95);
            color: rgba(230, 240, 255, 0.96);
            border: 1px solid rgba(90, 140, 255, 0.22);
            border-bottom-left-radius: 6px;
        }
        .chat-bubble.typing {
            min-width: 78px;
        }
        .typing-dots {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(180, 215, 255, 0.95);
            animation: typingPulse 1s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.18s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.36s;
        }
        @keyframes typingPulse {
            0%, 80%, 100% {
                opacity: 0.28;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-3px);
            }
        }
        #ai-input {
            width: 100%;
            min-height: 180px;
            max-height: 240px;
            resize: vertical;
            border: 1px solid rgba(90, 140, 255, 0.28);
            border-radius: 16px;
            padding: 16px;
            background: rgba(8, 14, 35, 0.9);
            color: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            box-shadow: inset 0 0 18px rgba(0, 80, 255, 0.1);
        }
        #ai-input::placeholder {
            color: rgba(180, 205, 255, 0.38);
        }
        #ai-send {
            border: 1px solid rgba(110, 165, 255, 0.35);
            background: linear-gradient(135deg, rgba(20, 80, 255, 0.95), rgba(0, 170, 255, 0.78));
            color: white;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        #ai-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 18px rgba(0, 120, 255, 0.28);
        }
        #ai-status {
            color: rgba(170, 210, 255, 0.78);
            font-size: 0.88rem;
            min-height: 20px;
        }
        #input-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            margin-left: 480px;
        }
        @media (max-width: 768px) {
            #ai-panel {
                width: 100%;
                height: 250px;
                border-right: none;
                border-bottom: 1px solid rgba(90, 140, 255, 0.22);
            }
            canvas {
                margin-left: 0;
                margin-top: 250px;
                height: calc(100vh - 250px);
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <aside id="ai-panel">
            <div id="chat-messages">
                <div class="chat-bubble ai">Bonjour Mr !</div>
            </div>
            <div id="input-row">
                <textarea id="ai-input" placeholder=""></textarea>
                <button id="ai-send">Envoyer à l'IA</button>
            </div>
        </aside>
        <canvas id="canvas"></canvas>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js "></script>
    <script>
        // ========== CONFIG ==========
        const config = {
            particleCount: 500,
            connectRadius: 80,
            maxLineWidth: 2.5,
            minLineWidth: 0.3,
            lineAlphaFactor: 0.6,
            decayRate: 0.98,
            reconnectionTime: 1500,
            cameraZ: 400, // Caméra à l'original
            globalScale: 0.55 // ✅ Réduction globale (0.55 = ~55% de la taille originale)
        };

        // ========== SCENE SETUP ==========
        const scene = new THREE.Scene();
        const initialSize = {
            width: window.innerWidth <= 768 ? window.innerWidth : window.innerWidth - 320,
            height: window.innerWidth <= 768 ? window.innerHeight - 250 : window.innerHeight
        };
        const camera = new THREE.PerspectiveCamera(75, initialSize.width / initialSize.height, 0.1, 2000);
        camera.position.z = config.cameraZ;
        const panelWidth = 480;
        const mobilePanelHeight = 250;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });

        function getViewportSize() {
            const isMobile = window.innerWidth <= 768;
            return {
                width: isMobile ? window.innerWidth : window.innerWidth - panelWidth,
                height: isMobile ? window.innerHeight - mobilePanelHeight : window.innerHeight
            };
        }

        const initialViewport = getViewportSize();
        renderer.setSize(initialViewport.width, initialViewport.height);
        renderer.setPixelRatio(window.devicePixelRatio);

        // ========== GLOBAL SCALE GROUP ==========
        const sceneRoot = new THREE.Group();
        scene.add(sceneRoot);
        sceneRoot.scale.set(config.globalScale, config.globalScale, config.globalScale); // 🔑 Réduction globale

        // ========== PARTICLES (identique à l'originale) ==========
        const particles = [];
        const particleGroup = new THREE.Group();
        sceneRoot.add(particleGroup); // Ajouté dans le groupe échelonné

        for (let i = 0; i < config.particleCount; i++) {
            const geometry = new THREE.SphereGeometry(1.2, 8, 8);
            const hue = 240; // Bleu
            const material = new THREE.MeshBasicMaterial({ color: new THREE.Color(`hsl(${hue}, 100%, 70%)`) });
            const mesh = new THREE.Mesh(geometry, material);

            mesh.userData = {
                n: Math.floor(Math.random() * 3) + 1,       // 1, 2, 3
                a: Math.random() * 5 + 2,                   // [2, 7]
                baseRadius: Math.random() * 200 + 50,       // [50, 250] → ✅ inchangé
                omega: (Math.random() * 0.01) - 0.005,      // [-0.005, 0.005]
                theta: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.002 + 0.001,
                hue: hue,
                reconnectTimer: 0,
                rippleX: 0,
                rippleY: 0,
            };

            particleGroup.add(mesh);
            particles.push(mesh);
        }

        // ========== CONNECTIONS (inchangées) ==========
        const linePositions = new Float32Array(config.particleCount * config.particleCount * 3 * 2);
        const lineColors = new Float32Array(config.particleCount * config.particleCount * 3 * 2);
        const lineGeometry = new THREE.BufferGeometry();
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));

        const lineMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 1,
            linewidth: config.maxLineWidth,
        });

        const linesMesh = new THREE.LineSegments(lineGeometry, lineMaterial);
        sceneRoot.add(linesMesh); // Ajouté dans le groupe échelonné

        function updateConnections() {
            const posAttr = lineGeometry.attributes.position;
            const colAttr = lineGeometry.attributes.color;
            let lineIdx = 0;

            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                if (p1.userData.reconnectTimer > 0) continue;

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    if (p2.userData.reconnectTimer > 0) continue;

                    const dx = p1.position.x - p2.position.x;
                    const dy = p1.position.y - p2.position.y;
                    const dz = p1.position.z - p2.position.z;
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (dist < config.connectRadius) {
                        const alpha = (1 - dist / config.connectRadius) * config.lineAlphaFactor;
                        const avgHue = (p1.userData.hue + p2.userData.hue) / 2;
                        const color = new THREE.Color(`hsl(${avgHue}, 100%, 70%)`);
                        
                        posAttr.setXYZ(lineIdx * 2, p1.position.x, p1.position.y, p1.position.z);
                        colAttr.setXYZ(lineIdx * 2, color.r * alpha, color.g * alpha, color.b * alpha);
                        
                        posAttr.setXYZ(lineIdx * 2 + 1, p2.position.x, p2.position.y, p2.position.z);
                        colAttr.setXYZ(lineIdx * 2 + 1, color.r * alpha, color.g * alpha, color.b * alpha);
                        
                        lineIdx++;
                    }
                }
            }
            
            posAttr.count = lineIdx * 2;
            colAttr.count = lineIdx * 2;
            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
        }

        // ========== ANIMATION LOOP ==========
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 16;

            particleGroup.rotation.x += 0.0001;
            particleGroup.rotation.y += 0.0001;

            particles.forEach(p => {
                const data = p.userData;
                data.theta += data.speed;
                const r = data.baseRadius + data.a * Math.cos(data.n * data.theta + data.omega * time);
                
                p.position.x = Math.cos(data.theta) * r + data.rippleX;
                p.position.y = Math.sin(data.theta) * r + data.rippleY;
                p.position.z = Math.sin(data.theta * 0.7) * r * 0.3;

                data.rippleX *= config.decayRate;
                data.rippleY *= config.decayRate;

                if (data.reconnectTimer > 0) {
                    data.reconnectTimer -= 16;
                    if (data.reconnectTimer < 0) data.reconnectTimer = 0;
                }
            });

            updateConnections();
            renderer.render(scene, camera);
        }

        // ========== INTERACTION (inchangée) ==========
        let isPointerDown = false;
        let pointerDownTime = 0;
        let lastPointerX = 0;
        let lastPointerY = 0;

        function applyRipple(dx, dy, power = 1) {
            particles.forEach(p => {
                p.userData.rippleX += dx * 0.001 * power;
                p.userData.rippleY += dy * 0.001 * power;
            });
        }

        function handlePointerDown(e) {
            isPointerDown = true;
            pointerDownTime = Date.now();
            lastPointerX = e.clientX || e.touches?.[0]?.clientX || 0;
            lastPointerY = e.clientY || e.touches?.[0]?.clientY || 0;
        }

        function handlePointerMove(e) {
            if (!isPointerDown) return;
            const currentX = e.clientX || e.touches?.[0]?.clientX || 0;
            const currentY = e.clientY || e.touches?.[0]?.clientY || 0;
            const dx = currentX - lastPointerX;
            const dy = currentY - lastPointerY;
            lastPointerX = currentX;
            lastPointerY = currentY;
            applyRipple(dx, dy, 1);
        }

        function handlePointerUp() {
            if (!isPointerDown) return;
            const holdDuration = Date.now() - pointerDownTime;
            if (holdDuration < 500) {
                particles.forEach(p => {
                    p.userData.rippleX += (Math.random() - 0.5) * 10;
                    p.userData.rippleY += (Math.random() - 0.5) * 10;
                });
            } else {
                particles.forEach(p => {
                    p.userData.reconnectTimer = config.reconnectionTime;
                });
            }
            isPointerDown = false;
        }

        const canvas = document.getElementById('canvas');
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handlePointerDown(e.touches[0]);
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handlePointerMove(e.touches[0]);
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            handlePointerUp();
        }, { passive: false });

        const aiInput = document.getElementById('ai-input');
        const aiSend = document.getElementById('ai-send');
        const chatMessages = document.getElementById('chat-messages');

        function addMessage(text, sender) {
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${sender}`;
            bubble.textContent = text;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return bubble;
        }

        function showTypingIndicator() {
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ai typing';
            bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return bubble;
        }

        function animateAiMessage(text) {
            const bubble = addMessage('', 'ai');
            let index = 0;

            function typeNextCharacter() {
                if (index < text.length) {
                    bubble.textContent += text.charAt(index);
                    index++;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    setTimeout(typeNextCharacter, 22);
                }
            }

            typeNextCharacter();
        }

        function generateAiReply(message) {
            const normalized = message.toLowerCase();

            if (normalized.includes('optimise')) {
                return "J'ai bien reçu ta demande d'optimisation. Je peux améliorer la structure, l'interface ou les performances selon ton objectif.";
            }
            if (normalized.includes('bug') || normalized.includes('erreur')) {
                return "D'accord. Décris-moi le bug ou colle le message d'erreur, et je te proposerai une correction claire.";
            }
            if (normalized.includes('crée') || normalized.includes('ajoute')) {
                return "Je peux t'aider à créer cette fonctionnalité. Donne-moi le détail exact de ce que tu veux voir apparaître.";
            }

            return `J'ai reçu ton message : "${message}". Dis-moi maintenant l'action précise que tu veux que je fasse et je te répondrai ici.`;
        }

        aiSend.addEventListener('click', () => {
            const message = aiInput.value.trim();

            if (!message) {
                return;
            }

            addMessage(message, 'user');
            aiInput.value = '';

            const typingBubble = showTypingIndicator();

            setTimeout(() => {
                const reply = generateAiReply(message);
                typingBubble.remove();
                animateAiMessage(reply);
            }, 900);
        });

        window.addEventListener('resize', () => {
            const viewport = getViewportSize();
            camera.aspect = viewport.width / viewport.height;
            camera.updateProjectionMatrix();
            renderer.setSize(viewport.width, viewport.height);
        });

        animate();
    </script>
</body>
</html>
